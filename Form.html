<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pendaftaran | Tech Community</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="./index.html">Tech Community</a>
            <div class="navbar-nav">
                <a class="nav-link" href="./index.html">Beranda</a>
                <a class="nav-link active" href="./form.html">Pendaftaran</a>
                <a class="nav-link" href="./Gallery.html">Multimedia</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-5">
                <div class="card shadow-sm p-4">
                    <h3 class="mb-4">Daftar Anggota Baru</h3>
                    <form id="memberForm">
                        <div class="mb-3">
                            <label class="form-label">Nama Lengkap</label>
                            <input type="text" id="nama" class="form-control" required placeholder="Contoh: Budi Santoso">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" required placeholder="budi@email.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Minat Teknologi</label>
                            <select id="minat" class="form-select">
                                <option value="Web Development">Web Development</option>
                                <option value="Cyber Security">Cyber Security</option>
                                <option value="Data Science">Data Science</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Simpan Data</button>
                    </form>
                </div>
            </div>

            <div class="col-md-7">
                <h3 class="mb-4">Daftar Anggota</h3>
                <table class="table table-striped border">
                    <thead class="table-dark">
                        <tr>
                            <th>No</th>
                            <th>Nama</th>
                            <th>Email</th>
                            <th>Minat</th>
                        </tr>
                    </thead>
                    <tbody id="memberTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>

        let anggotaCommunity = [];

        const form = document.getElementById('memberForm');
        const tableBody = document.getElementById('memberTableBody');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const nama = document.getElementById('nama').value;
            const email = document.getElementById('email').value;
            const minat = document.getElementById('minat').value;

            anggotaCommunity.push({ nama, email, minat });

            renderTable();
            
            form.reset();
        });

        function renderTable() {
            tableBody.innerHTML = '';
            anggotaCommunity.forEach((data, index) => {
                const row = `<tr>
                    <td>${index + 1}</td>
                    <td>${data.nama}</td>
                    <td>${data.email}</td>
                    <td>${data.minat}</td>
                </tr>`;
                tableBody.innerHTML += row;
            });
        }
    </script>
</body>
</html>
